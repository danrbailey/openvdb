trigger:
- cmake_azure

stages:
- stage: Build

  jobs:
  - job: ABI6
    pool:
      vmImage: 'Ubuntu-16.04'
    steps:
    - bash: ci/install.sh
    - bash: ci/install_cmake.sh 3.11.4
    - bash: ci/install_boost.sh 1.66.0
    - bash: ci/install_tbb.sh 2018
    - bash: ci/install_openexr.sh 2.3.0
    - bash: ci/install_blosc.sh 1.5.0
    - bash: ci/build.sh clang++ Release 6 ON
    - bash: ./build/openvdb/unittest/vdb_test -v
