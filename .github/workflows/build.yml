
name: Build

on:
  push:
    branches:
      - 'testhoudini'

jobs:
  houdini18_0:
    runs-on: ubuntu-16.04
    container:
      image: aswf/ci-base:2019
    steps:
    - uses: actions/checkout@v2
    - name: read_houdini_cache
      uses: actions/cache@v1
      with:
        path: houdini18_0
        key: unused7
        restore-keys: test7houdini18_0-
    - name: install_houdini
      run: ./ci/install_houdini.sh 18.0
    - name: build
      run: ./ci/build_houdini.sh clang++ Release ON
